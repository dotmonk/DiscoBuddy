<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0a0a0f" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/svg+xml" href="/DiscoBuddy/favicon.svg" />
    <link rel="manifest" href="/DiscoBuddy/manifest.webmanifest" />
    <title>DiscoBuddy</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%; height: 100%;
        background: #0a0a0f;
        overflow: hidden;
        font-family: system-ui, sans-serif;
      }
      #canvas {
        position: fixed; inset: 0;
        width: 100%; height: 100%;
        display: block;
      }
      #ui {
        position: fixed; inset: 0;
        pointer-events: none;
        display: flex; flex-direction: column;
        align-items: center; justify-content: flex-end;
        padding-bottom: 24px; gap: 12px;
      }
      #start-btn {
        pointer-events: all;
        padding: 14px 36px;
        font-size: 1.1rem;
        font-weight: 600;
        letter-spacing: 0.05em;
        color: #fff;
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.25);
        border-radius: 100px;
        cursor: pointer;
        backdrop-filter: blur(12px);
        transition: background 0.2s, transform 0.1s;
      }
      #start-btn:hover { background: rgba(255,255,255,0.15); }
      #start-btn:active { transform: scale(0.97); }
      #viz-name {
        font-size: 0.75rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.35);
        transition: opacity 0.5s;
      }
      #progress-bar {
        width: 120px; height: 2px;
        background: rgba(255,255,255,0.1);
        border-radius: 2px;
        overflow: hidden;
      }
      #progress-fill {
        height: 100%;
        background: rgba(255,255,255,0.5);
        border-radius: 2px;
        width: 0%;
        transition: width 0.1s linear;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div id="ui">
      <div id="viz-name">—</div>
      <div id="progress-bar"><div id="progress-fill"></div></div>
      <button id="start-btn">Tap to start</button>
    </div>
    <script type="module" src="/src/main.ts"></script>
    <script src="/DiscoBuddy/registerSW.js"></script>
  </body>
</html>
